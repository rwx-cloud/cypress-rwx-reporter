on:
  github:
    push:
      init:
        commit-sha: ${{ event.git.sha }}
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
base:
  image: ubuntu:24.04
  config: rwx/base 1.1.1

tasks:
  - key: code
    call: git/clone 2.0.8
    with:
      repository: https://github.com/rwx-cloud/cypress-rwx-reporter.git
      ref: ${{ init.commit-sha }}

  - key: tool-versions
    use: code
    call: rwx/tool-versions 1.0.8
    filter:
      - .tool-versions

  - key: node
    call: nodejs/install 1.1.14
    with:
      node-version: ${{ tasks.tool-versions.values.nodejs }}

  - key: node-modules
    use: [code, node]
    runner:
      tmpfs: true
    run: npm ci
    filter:
      - package.json
      - package-lock.json

  - key: unit-tests
    use: node-modules
    run: npm run test:unit

  - key: chrome
    call: google/install-chrome 2.1.10
    with:
      chrome-version: stable

  - key: integration-tests
    use: [chrome, node-modules]
    run: npm run test:integration
